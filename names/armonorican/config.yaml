# Ebiam dialect — urban/cosmopolitan, softened Armonorican
# Aggeuios = default (armonorican_dialect), no transforms
dialects:
  - id: ebiam_dialect
    # Prefix: Ll→L, Rh→R, Gwy→Gui, Gwe→Gue, Gwa→Gua, Gw→Gu
    prefix_rules_m:
      - [Ll, L]
      - [Rh, R]
      - [Gwy, Gui]
      - [Gwe, Gue]
      - [Gwa, Gua]
      - [Gw, Gu]
    prefix_rules_f:
      - [Ll, L]
      - [Rh, R]
      - [Gwy, Gui]
      - [Gwe, Gue]
      - [Gwa, Gua]
      - [Gw, Gu]
    # Suffix: w→v transitions + vowel simplifications
    rules_m:
      - [wydd, vid]
      - [wedd, ved]
      - [wern, vern]
      - [wyn, vin]
      - [wen, ven]
      - [wyr, vir]
      - [wys, vis]
      - [wyl, vil]
      - [wel, vel]
      - [ydd, id]
      - [yll, il]
    rules_f:
      - [wydd, vid]
      - [wedd, ved]
      - [wern, vern]
      - [wyn, vin]
      - [wen, ven]
      - [wyr, vir]
      - [wys, vis]
      - [wyl, vil]
      - [wel, vel]
      - [ydd, id]
      - [yll, il]
    # Replace: dd→d (Welsh voiced dental → French d)
    replace_rules_m:
      - [dd, d]
    replace_rules_f:
      - [dd, d]

