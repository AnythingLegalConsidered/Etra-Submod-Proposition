# Dialect rules — using pre-computed variant table
# Salt Sordrenic = default (no transform)
dialects:
  # Stone Sordrenic — harder, e->o, consonant hardening
  - id: stone_sordrenic_dialect
    variants_file: dialect_variants.txt
    variants_column: 1

  # Lutin Sordrenic — elvish, softened, i-insertion
  - id: lutin_sordrenic_dialect
    variants_file: dialect_variants.txt
    variants_column: 2

  # Pantagrin Sordrenic — giantsborn, heavier, a->o
  - id: pantagrin_sordrenic_dialect
    variants_file: dialect_variants.txt
    variants_column: 3

# ============================================================
# CULTURE -> DIALECT MAPPINGS
# ============================================================
# salt_sordrenic = default dialect (sordrenic_language), no patch needed

cultures:
  - id: stone_sordrenic_culture
    dialect: stone_sordrenic_dialect
    color: map_jin
    tags: [occitan_gfx, french_gfx, west_mediterranean_gfx, mediterranean_gfx, western_european_gfx, european_gfx]
    groups: [human_group, sordrenic_group]

  - id: pantagrins_culture
    dialect: pantagrin_sordrenic_dialect
    color: map_PRU
    tags: [giantsborn_gfx, swedish_gfx, western_european_gfx, european_gfx]
    groups: [sordrenic_group, giantsborn_group]

  - id: lutin_culture
    dialect: lutin_sordrenic_dialect
    color: map_bjarmian
    tags: [elf_gfx, occitan_gfx, french_gfx, west_mediterranean_gfx, mediterranean_gfx, western_european_gfx, european_gfx]
    groups: [sordrenic_group, elven_group, ardrainic_group]
