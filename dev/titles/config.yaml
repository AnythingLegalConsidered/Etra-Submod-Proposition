    # Fallback: catches non-human Torrent cultures (himmelskind, tieflings, etc.)
    - dialect: Torrent
      id: torrent_language
      fallback: true
      also_matches:
        - south_torrentor_dialect
        - central_torrentor_dialect
        - north_torrentor_dialect
      empire: [Kaisarmund, Kaisarmunde]
