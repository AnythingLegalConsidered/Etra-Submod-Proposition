# =============================================================================
# RULER TITLES (Monarchy)
# =============================================================================
#
# Fantasy ruler rank titles per language and dialect.
# When game rule = Fantasy and government = Monarchy, ruler titles
# (Emperor/King/Duke/Count) display in the ruler's culture language.
#
# Format:
#   - dialect: Display name
#     id: game language/dialect/culture ID (used in trigger)
#     trigger: language (default) or culture (for culture-specific matching)
#     fallback: true (placed AFTER specific dialects, catches unmatched cultures)
#     also_matches: [extra IDs that should use the same titles]
#     empire/kingdom/duchy/county: [male_title, female_title]

ruler_titles:

  # =========================================================================
  # ARDRAINIC (Old French medieval + Arthurian)
  # =========================================================================

  ardrainic:
    - dialect: Sittadellian
      id: sittadellian_dialect
      empire: [Empereort, Emperist]
      kingdom: [Reist, Reinort]
      duchy: [Dust, Ducest]
      county: [Cuent, Contevort]
    - dialect: Aullerican
      id: aullerican_dialect
      empire: [Empereour, Emperaeis]
      kingdom: [Raeis, Reinoer]
      duchy: [Dues, Ducaesse]
      county: [Cuaens, Contevoer]
    - dialect: Aloisoise
      id: aloisoise_dialect
      empire: [Empereoren, Empereiser]
      kingdom: [Reiser, Reinoren]
      duchy: [Duser, Ducessen]
      county: [Cuenser, Contevoren]
    - dialect: Caprainois
      id: caprainois_dialect
      empire: [Emperorel, Empereil]
      kingdom: [Rais, Reinorel]
      duchy: [Duis, Ducelle]
      county: [Cuien, Contevorel]
    - dialect: Pwasciards
      id: pwasciards_dialect
      empire: [Empero, Emperi]
      kingdom: [Re, Reino]
      duchy: [Du, Duces]
      county: [Cuen, Contevo]
    - dialect: Serenish
      id: serenish_dialect
      empire: [Emporor, Emporois]
      kingdom: [Rois, Reinor]
      duchy: [Dus, Ducosse]
      county: [Cuons, Contevor]
    - dialect: Berenguer
      id: berenguer_dialect
      empire: [Emperort, Emperein]
      kingdom: [Rein, Reinort]
      duchy: [Duz, Ducenn]
      county: [Cuenn, Contevort]
    - dialect: Draquatin
      id: draquatin_dialect
      empire: [Emperoun, Emperouna]
      kingdom: [Rei, Reinouna]
      duchy: [Dous, Ducessa]
      county: [Counes, Contevouna]
    - dialect: Chevallois
      id: chevallois_dialect
      empire: [Empereourt, Emperoise]
      kingdom: [Reault, Reinourt]
      duchy: [Dault, Ducoise]
      county: [Cuault, Contevourt]
    - dialect: Appavin
      id: appavin_dialect
      empire: [Emperoret, Empereiset]
      kingdom: [Reit, Reinoret]
      duchy: [Duet, Ducesset]
      county: [Cuet, Contevoret]
    # Fallback: catches Ardrainien (base language) + any unmatched Ardrainic culture
    - dialect: Ardrainien
      id: ardrainic_language
      fallback: true
      empire: [Empereor, Empereis]
      kingdom: [Reis, Reinore]
      duchy: [Dus, Ducesse]
      county: [Cuens, Contevore]

  # =========================================================================
  # TORRENT (Germanic archaique)
  # =========================================================================

  torrent:
    - dialect: Heuhian
      id: heuhian_dialect
      empire: [Kaisarmund, Kaisarmunde]
      kingdom: [Kunig, Kunigin]
      duchy: [Herzgar, Herzgarde]
      county: [Grafvarn, Grafvarne]
    - dialect: Fullhorner
      id: fullhorner_dialect
      empire: [Kaisaermaend, Kaisaermaende]
      kingdom: [Kunewald, Kunewalde]
      duchy: [Herzwaeld, Herzwalde]
      county: [Grafvaern, Grafvaerne]
    - dialect: Afhaemeisan
      id: afhaemeisan_dialect
      empire: [Kaisarvald, Kaisarvalde]
      kingdom: [Kunivald, Kunivalde]
      duchy: [Herzvald, Herzvalde]
      county: [Grafvald, Grafvalde]
    - dialect: Lower Serenic
      id: lower_serenic_dialect
