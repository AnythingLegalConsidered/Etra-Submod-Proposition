# =============================================================================
# Etra: Names & Cultures — Title Translations Config
# =============================================================================
#
# Fantasy language translations for country/title names.
# Each title can have translations per language. When the game rule is set to
# "Fantasy Languages", country names change based on the ruler's culture.
#
# Usage:
#   python generate_titles.py              # generate from this config
#   python generate_titles.py --list       # show translation status
#   python generate_titles.py --audit      # find English names needing translation
#
# Then run: python generate_mod.py --all   # picks up via overrides/
# =============================================================================

game_rule:
  key: etra_title_names
  default: fantasy
  label: "Etra: Title Names"
  desc_english: "Country names stay in English (e.g. Scarlet Order)"
  desc_fantasy: "Country names in their ruler's fantasy language"

languages:
  - ardrainic_language
  - torrent_language
  - moran_language
  - vulgar_moran_language
  - sordrenic_language
  - armonorican_language
  - hravevi_language

# =============================================================================
# TITLE TRANSLATIONS
# =============================================================================

