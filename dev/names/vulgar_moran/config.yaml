# Dialect rules — Venturian is default (no transform)
dialects:
  # Rovina — Latin preserved, elegant, Italianizing
  - id: rovina_dialect
    rules_m:
      - [ian, iano]
      - [an, anus]
      - [el, ello]
      - [or, orius]
    rules_f:
      - [iane, iana]
      - [ene, enia]
      - [ine, ina]

  # Koth — Germano-Latin, hardened, military
  - id: koth_dialect
    rules_m:
      - [ven, vern]
      - [an, arn]
      - [el, elt]
      - [or, orn]
    rules_f:
      - [iel, il]
      - [ene, en]
      - [ine, in]

  # Thanok — Maritime, truncated, pragmatic
  - id: thanok_dialect
    rules_m:
      - [avel, av]
      - [oven, ov]
      - [ian, ic]
      - [an, ""]
      - [or, o]
      - [el, ""]
      - [en, ""]
    rules_f:
      - [ene, a]
      - [ine, a]
      - [iane, a]
      - [iel, a]

  # Fluviolander — Fluvial, compound nature, boatmen
  - id: fluviolander_dialect
    rules_m:
      - [an, ander]
      - [el, elan]
      - [en, ender]
    rules_f:
      - [iane, iande]
      - [ene, ande]
      - [ine, inde]

  # Fioranelle — Latin germanized, angular
  - id: fioranelle_dialect
    rules_m:
      - [an, ann]
      - [or, ort]
      - [el, eld]
      - [en, enn]
    rules_f:
      - [iane, ilde]
      - [ene, elde]
      - [ine, inde]

  # Marcheur — Latin Occitanized, warm, Sordrenic bridge
  - id: marcheur_dialect
    rules_m:
      - [an, anc]
      - [or, our]
      - [el, eu]
      - [en, enc]
    rules_f:
      - [iane, ienne]
      - [ene, enne]
      - [or, eure]

  # Rattolini — Ratfolk, percussive double-T, rapid Italian-rat
  # Distinct from Knawven (-ss sibilant) and Torrentor Ratfolk (-sz fricative)
  - id: rattolini_dialect
    extra_male:
      - Gnavio
      - Vernaci
      - Scherzs
      - Vicitz
      - Voserro
      - Vermic
      - Rosci
      - Jessaros
      - Ginoz
      - Rissto
      - Strinaci
      - Mavisci
    extra_female:
      - Cecisca
    rules_m:
      - [ian, itti]
      - [an, atti]
      - [or, otti]
      - [el, etti]
      - [en, etti]
      - [ic, itti]
      - [van, vatti]
      - [ric, ritti]
      - [ald, atti]
      - [mund, mutti]
    rules_f:
      - [iane, itta]
      - [ene, etta]
      - [ine, itta]
      - [iel, etta]
      - [ara, atta]
      - [ora, otta]
      - [ela, etta]
      - [ina, itta]

