# ============================================================
# Dialect transformation rules (10 dialects)
# ============================================================
# Rules sorted by generator (longest suffix first, first match wins).
# Male and female rules are separate. Dynasty and lowborn stay untransformed.

dialects:
  # SITTADELLIAN (Picardie/Normandie — dur, fortifie)
  - id: sittadellian_dialect
    variants_file: dialect_variants.txt
    variants_column: 1
    rules_m:
      - [elin, elard]
      - [val, vard]
      - [ain, art]
      - [as, ard]
      - [en, ent]
      - [or, ort]
      - [el, eld]
      - [in, ird]
      - [ald, ardt]
      - [ic, ick]
    rules_f:
      - [eline, elard]
      - [andre, ardre]
      - [aine, arde]
      - [aire, arde]
      - [ore, ort]
      - [ande, arde]
      - [inde, irde]
      - [elde, eld]
      - [ence, ent]
      - [elle, eld]
      - [enne, ent]
      - [ine, irde]
      - [ise, ist]
      - [ene, ent]
      - [el, eld]

  # AULLERICAN (Normandie/Bretagne — diphtongues, influence celtique)
  - id: aullerican_dialect
    variants_file: dialect_variants.txt
    variants_column: 2
    rules_m:
      - [val, vael]
      - [ain, aen]
      - [as, aes]
      - [or, oer]
      - [en, aen]
      - [el, eau]
      - [in, ein]
      - [ald, aeld]
      - [ic, iek]
    rules_f:
      - [eline, eligne]
      - [andre, aendre]
      - [aine, aene]
      - [aire, aere]
      - [aise, aese]
      - [ore, oer]
      - [ande, aende]
      - [inde, iende]
      - [elde, aelde]
      - [ence, aence]
      - [elle, ealle]
      - [enne, aenne]
      - [ine, igne]
      - [ene, aene]
      - [el, eau]

  # ALOISOISE (Lorraine/Champagne — rallongement lorrain)
  - id: aloisoise_dialect
    variants_file: dialect_variants.txt
    variants_column: 3
    rules_m:
      - [elin, eliner]
      - [val, valen]
      - [ain, ainer]
      - [as, aser]
      - [or, oren]
      - [en, ener]
      - [el, eler]
      - [in, iner]
      - [ald, alder]
      - [ic, icher]
    rules_f:
      - [eline, eliner]
      - [andre, andrer]
      - [aine, ainer]
      - [aire, airer]
      - [inde, inder]
      - [ore, oren]
      - [ande, anden]
      - [elle, eller]
      - [enne, enner]
      - [elde, elder]
      - [ence, encer]
      - [ine, iner]
      - [ise, iser]
      - [ene, ener]
      - [el, eler]

  # CAPRAINOIS (Loire/Anjou — doux, liquide)
  - id: caprainois_dialect
    variants_file: dialect_variants.txt
    variants_column: 4
    rules_m:
      - [val, vel]
      - [ain, in]
      - [as, ais]
      - [or, orel]
      - [el, eil]
      - [en, ien]
      - [in, ien]
      - [ald, al]
      - [ic, is]
    rules_f:
      - [andre, andrel]
      - [aine, ine]
      - [aire, airel]
      - [inde, indel]
      - [ore, orel]
