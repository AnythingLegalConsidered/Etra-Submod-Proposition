# ============================================================
# DIALECT RULES — Generate localization variants
# ============================================================
# Transform order: overrides → prefix_rules → suffix_rules → replace_rules

dialects:

  # ============================================================
  # FULLHORNER (archaic/vetusian) — intercalaire + vowel shift
  # ============================================================
  - id: fullhorner_dialect
    # Suffix rules encode both intercalaire 'e' and a→ae, o→oe shifts
    variants_file: dialect_variants.txt
    variants_column: 1
    rules_m:
      - [ewald, ewaeld]    # 3-morpheme names: Eberenwald etc.
      - [enwald, enwaeld]
      - [enmar, enmaer]
      - [stred, estred]
      - [gast, egaest]
      - [stal, estael]
      - [vald, evaeld]
      - [wald, ewaeld]
      - [mar, emaer]
      - [mund, emaend]
      - [gar, egaer]
      - [hard, ehaerd]
      - [bern, ebern]
      - [olf, eolf]
      - [rik, erik]
      - [stein, estein]
      - [brand, ebraend]
      - [kald, kaeld]
      - [dorn, edoern]
      - [varn, evarn]
      - [morn, emoern]
      - [gust, egust]
