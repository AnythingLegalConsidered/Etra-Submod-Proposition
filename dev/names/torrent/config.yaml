# Torrent language config
# Germanic-inspired language — 13 human dialects + 4 non-human
# Uses static language file (hand-crafted with original mod names + dialect blocks)
# Config generates LOCALIZATION ONLY (dialect variant entries)

language_id: torrent_language
color: map_german
family: torrentor_language_family
default_dialect_id: heuhian_dialect

# Copy the existing static file instead of generating a language patch
static_language_file: 01_etra_torrent.txt
language_patch_file: 01_etra_torrent.txt

patronym_suffix_son: "patronym_suffix_german_son"
patronym_suffix_daughter: "patronym_suffix_german_son"
location_prefix: "location_prefix_german"

