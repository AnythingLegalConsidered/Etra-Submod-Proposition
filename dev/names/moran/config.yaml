# Dialect rules — suffix + replace for chronological strata
# High Moran = default (no transform)
dialects:
  # Early Moran — archaic, republican (ae→ai, -us→-os)
  - id: early_moran_dialect
    rules_m:
      - [ius, ios]
      - [us, os]
    rules_f:
      - [illa, ila]
    replace_rules_m:
      - [Ae, Ai]
      - [ae, ai]
    replace_rules_f:
      - [Ae, Ai]
      - [ae, ai]

  # Late Moran — eroded, decadent (-us→-o, ae→e)
  - id: late_moran_dialect
    rules_m:
      - [ius, io]
      - [us, o]
      - [ax, as]
    rules_f:
      - [illa, ella]
    replace_rules_m:
      - [Ae, E]
      - [ae, e]
    replace_rules_f:
      - [Ae, E]
      - [ae, e]

  # Novus Moran — contaminated by vulgar moran (-or→-ore, -ax→-ace)
  - id: novus_moran_dialect
    rules_m:
      - [ius, io]
      - [us, o]
      - [or, ore]
      - [ax, ace]
    rules_f:
      - [ina, ine]
      - [illa, elle]
    replace_rules_m:
      - [Ae, E]
      - [ae, e]
    replace_rules_f:
      - [Ae, E]
      - [ae, e]

  # Vivum Moran — proto-Italian, melodious (-or→-ore, -er→-ero)
  - id: vivum_moran_dialect
    rules_m:
      - [ius, io]
      - [us, o]
      - [or, ore]
      - [ax, ace]
      - [er, ero]
    rules_f:
      - [illa, ella]
    replace_rules_m:
      - [Ae, E]
      - [ae, e]
    replace_rules_f:
      - [Ae, E]
      - [ae, e]

