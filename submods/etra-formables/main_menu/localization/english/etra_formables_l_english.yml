 # Formable country names
 A321: "Daqueland"
 A321_ADJ: "Daquelander"

 # Formable descriptions
 A321_f: "Daqueland"
 A321_f_desc: "The Dragon Lands have long been divided among petty lords and rival cities, each claiming dominion over a fragment of the ancient drake-tamers' legacy. Crelzerte, Wryne, Guarden — names that once stood united under the banner of the dragon now squabble over tolls and borders. To reunite the Daqueland under one ruler is to restore the proud tradition of those who first settled in the shadow of the great wyrms."
